<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>📋 Projets</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#F6F7FB;--card:#FFF;--dark:#181B34;
  --accent:#6161FF;--green:#00C875;--amber:#FDAB3D;--red:#E2445C;--blue:#0086C0;
  --text:#323338;--sec:#676879;--muted:#C3C6D4;
  --border:#E6E9EF;--hover:#F5F6F8;
}
body{font-family:'Figtree',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
::selection{background:var(--accent);color:#fff;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:var(--muted);border-radius:2px;}

/* Layout */
.wrap{max-width:680px;margin:0 auto;padding:24px 20px 40px;}

/* Top bar */
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;}
.topbar h1{font-size:20px;font-weight:700;color:var(--dark);letter-spacing:-.03em;}
.topbar .sync{font-size:9px;font-weight:600;margin-left:8px;}
.topbar-actions{display:flex;gap:6px;}
.icon-btn{width:32px;height:32px;border-radius:8px;border:none;background:transparent;color:var(--sec);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.icon-btn:hover{background:var(--hover);}

/* Quick input */
.quick{display:flex;align-items:center;gap:10px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:20px;transition:border-color .2s;box-shadow:0 1px 3px rgba(0,0,0,.03);}
.quick:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(97,97,255,.1);}
.quick input{flex:1;border:none;outline:none;font-size:14px;font-family:inherit;color:var(--text);background:transparent;}
.quick input::placeholder{color:var(--muted);}
.quick select{border:none;outline:none;font-size:11px;font-family:inherit;color:var(--sec);background:transparent;cursor:pointer;padding:4px;}
.quick button{padding:6px 16px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .15s;}
.quick button:hover{background:#4E4ED9;}

/* Filters */
.filters{display:flex;gap:2px;margin-bottom:16px;}
.ftab{padding:6px 14px;border-radius:20px;border:none;background:transparent;color:var(--sec);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;}
.ftab:hover{background:var(--hover);}
.ftab.on{background:var(--accent);color:#fff;font-weight:600;}
.spacer{flex:1;}

/* Selection */
.selbar{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:8px 12px;background:#FFF0F2;border-radius:8px;font-size:11px;color:var(--text);}

/* Cards */
.cards{display:flex;flex-direction:column;gap:2px;}
.row{display:flex;align-items:flex-start;transition:opacity 2.5s ease-out;}
.row.fading{opacity:.12;}
.row.done{opacity:.4;}
.check{width:28px;padding-top:12px;display:flex;justify-content:center;flex-shrink:0;cursor:pointer;}
.cb{width:17px;height:17px;border-radius:50%;border:2px solid var(--muted);background:var(--card);display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;font-weight:700;transition:all .2s;cursor:pointer;}
.cb.on{border-color:var(--green);background:var(--green);}
.crd{flex:1;padding:10px 14px;border-radius:8px;cursor:pointer;transition:background .12s;}
.crd:hover{background:var(--hover);}
.crd.sel{background:#F0EEFF;}
.crd-top{display:flex;justify-content:space-between;align-items:center;gap:10px;}
.crd-name{font-size:14px;font-weight:500;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.crd-name.done{text-decoration:line-through;color:var(--muted);}
.meta{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--muted);}
.pill{padding:2px 8px;border-radius:20px;font-size:9px;font-weight:600;white-space:nowrap;}
.prog{width:36px;height:3px;border-radius:2px;background:var(--border);overflow:hidden;}
.prog-fill{height:100%;border-radius:2px;transition:width .3s;}

/* Inline tasks */
.itasks{margin-top:6px;display:flex;flex-direction:column;gap:0;}
.it{display:flex;align-items:center;gap:7px;padding:3px 0;font-size:12px;color:var(--sec);transition:opacity 2.5s ease-out,background .3s;}
.it.fading{opacity:.08;background:rgba(0,200,117,.06);border-radius:4px;}
.it.tdone{opacity:.3;}
.it-cb{width:14px;height:14px;border-radius:4px;border:1.5px solid var(--muted);background:var(--card);display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff;font-weight:700;transition:all .2s;cursor:pointer;flex-shrink:0;}
.it-cb.on{border-color:var(--green);background:var(--green);}
.it span.dn{color:var(--muted);text-decoration:line-through;}

/* Modal */
.ov{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.25);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:16px;}
.mod{background:var(--card);border-radius:12px;padding:24px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,.12);}
.mod h3{font-size:16px;font-weight:700;color:var(--dark);}
.mod-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.mod-x{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);padding:4px;}
.mod label{font-size:11px;font-weight:600;color:var(--sec);display:block;margin-bottom:4px;}
.mod input,.mod select{width:100%;padding:9px 12px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;font-family:inherit;outline:none;color:var(--text);transition:border-color .15s;}
.mod input:focus{border-color:var(--accent);}
.sb{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;border:1.5px solid var(--border);background:var(--card);color:var(--sec);}
.sb.on{color:#fff;}
.tr{display:flex;gap:6px;align-items:center;padding:6px 8px;border-radius:6px;font-size:12px;transition:all .3s;border-left:3px solid transparent;}
.tr:hover{background:var(--hover);}
.tr.fading{background:rgba(0,200,117,.08);opacity:0;border-left-color:var(--green);}
.nr{display:flex;gap:8px;align-items:flex-start;padding:6px 8px;border-radius:6px;font-size:12px;line-height:1.35;border-left:3px solid var(--border);}
.nr:hover{background:var(--hover);}
.rm{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0 2px;line-height:1;opacity:0;transition:opacity .15s;}
.tr:hover .rm,.nr:hover .rm{opacity:1;}
.cfm{background:var(--card);border-radius:12px;padding:28px;width:100%;max-width:340px;box-shadow:0 16px 48px rgba(0,0,0,.12);text-align:center;}
.cfm p{margin:0 0 20px;font-size:15px;font-weight:600;}
.btn{padding:7px 18px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:12px;font-family:inherit;transition:all .15s;}
.btn:hover{opacity:.88;}
.btn-a{background:var(--accent);color:#fff;}
.btn-r{background:var(--red);color:#fff;}
.btn-g{background:transparent;color:var(--sec);border:1px solid var(--border);}
.btn-t{background:none;border:none;color:var(--muted);font-size:10px;cursor:pointer;font-family:inherit;}
.btn-t:hover{color:var(--sec);}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:13px;}
</style>
</head>
<body>
<div id="app"></div>
<script>
const BIN_ID="69b32b9ab7ec241ddc634928",AK="$2a$10$c6o3RYJkkxNpy7r.NY3DW.bz4LyKK5Pwz.3ALRn2LB7B9TB85jKiO";
const BU="https://api.jsonbin.io/v3/b/"+BIN_ID,HD={"Content-Type":"application/json","X-Master-Key":AK};
const DF=[
  {id:"p1",name:"Template Jira — Quiz Ciblage v2",status:"In Progress",tasks:[{text:"Ajouter les questions MC labels",done:false,date:"2026-01"},{text:"Questions recurring journeys",done:false,date:"2026-01"},{text:"Valider 5 nouvelles questions v2",done:true,date:"2025-12"}],notes:[{date:"2025-12",text:"5 questions validées (v2)"},{date:"2025-11",text:"Structure 2 parties"}]},
  {id:"p2",name:"E-Certificat Auto — Merge mensuel",status:"In Progress",tasks:[{text:"Prochaine vague merge NRB",done:false,date:"2026-01"}],notes:[{date:"2025-12",text:"Script merge Python opérationnel"}]},
  {id:"p3",name:"Ambassadeur Data 2026",status:"To Do",tasks:[{text:"Planifier news #1",done:false,date:"2026-01"},{text:"Premier atelier",done:false,date:"2026-01"},{text:"Formation data catalogue",done:false,date:"2026-01"},{text:"Formation ODE consumer",done:false,date:"2026-01"}],notes:[{date:"2026-01",text:"7 sous-objectifs"}]},
  {id:"p4",name:"Loyalty Auto Case 1",status:"In Progress",tasks:[],notes:[{date:"2026-01",text:"Automation 11 activities / 10 steps"}]},
  {id:"p5",name:"Exploitation Devis — Scripts hebdo",status:"Done",tasks:[{text:"Traitement 1",done:true,date:"2025-12"},{text:"Traitement 2",done:true,date:"2025-12"}],notes:[{date:"2025-12",text:"Opérationnels"}]},
  {id:"p6",name:"IBAN Récupération clients",status:"To Do",tasks:[{text:"Coordonner avec V. Pécasse et L. Kluge",done:false,date:"2026-01"}],notes:[{date:"2026-01",text:"~20% clients sans IBAN"}]},
];
const ST={"To Do":{c:"#0086C0",bg:"#E0F4FF"},"In Progress":{c:"#FDAB3D",bg:"#FFF4E0"},"Done":{c:"#00C875",bg:"#E0FFF0"}};
let s={p:[],ok:false,sy:"loading",f:"All",ed:null,exp:false,keys:false,cm:null,cf:null,nt:"",nk:"",an:"",as:"To Do",sel:new Set(),ft:new Set(),fp:new Set()};
const ftR=new Set(),fpR=new Set();let svT=null;
const gid=()=>"p"+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const td=()=>new Date().toISOString().slice(0,10);
async function lb(){const r=await fetch(BU+"/latest",{headers:HD});if(!r.ok)throw 0;return(await r.json()).record?.projects||[];}
async function sb(p){const r=await fetch(BU,{method:"PUT",headers:HD,body:JSON.stringify({projects:p})});if(!r.ok)throw 0;}
function ps(p){s.p=p;s.sy="saving";R();if(svT)clearTimeout(svT);svT=setTimeout(async()=>{try{await sb(p);s.sy="synced";}catch{s.sy="error";}R();},800);}
(async()=>{try{const d=await lb();s.p=d.length?d:DF;if(!d.length)await sb(DF);s.sy="synced";}catch{s.p=DF;s.sy="error";}s.ok=true;R();document.addEventListener("keydown",onK);})();

function up(id,x){s.p=s.p.map(p=>p.id===id?{...p,...x}:p);ps(s.p);}
function togP(id){const p=s.p.find(x=>x.id===id);if(!p)return;if(s.fp.has(id)){fpR.delete(id);s.fp.delete(id);R();return;}if(p.status==="Done"){up(id,{status:"To Do"});return;}fpR.add(id);s.fp.add(id);R();setTimeout(()=>{if(!fpR.has(id))return;fpR.delete(id);s.fp.delete(id);up(id,{status:"Done"});},3000);}
function togT(pid,i){const k=pid+"-"+i,p=s.p.find(x=>x.id===pid),t=(p?.tasks||[])[i];if(!t)return;if(s.ft.has(k)){ftR.delete(k);s.ft.delete(k);R();return;}if(t.done){const ts=[...p.tasks];ts[i]={...ts[i],done:false};up(pid,{tasks:ts});return;}ftR.add(k);s.ft.add(k);R();setTimeout(()=>{if(!ftR.has(k))return;ftR.delete(k);s.ft.delete(k);const p2=s.p.find(x=>x.id===pid),ts=[...(p2?.tasks||[])];if(ts[i]&&!ts[i].done)ts[i]={...ts[i],done:true};up(pid,{tasks:ts});},3000);}
function qadd(){if(!s.an.trim())return;const n={id:gid(),name:s.an.trim(),status:s.as,tasks:[],notes:[]};ps([n,...s.p]);s.an="";s.as="To Do";s.ed=n.id;s.nt="";s.nk="";R();setTimeout(()=>{const el=document.getElementById("qi");if(el)el.value="";},50);}
function atk(){if(!s.nk.trim()||!s.ed)return;const p=s.p.find(x=>x.id===s.ed);up(s.ed,{tasks:[...(p.tasks||[]),{text:s.nk.trim(),done:false,date:td()}]});s.nk="";R();}
function ant(){if(!s.nt.trim()||!s.ed)return;const p=s.p.find(x=>x.id===s.ed);up(s.ed,{notes:[{date:td(),text:s.nt.trim()},...(p.notes||[])]});s.nt="";R();}
function cfm(m,f){s.cm=m;s.cf=f;R();}
function xcfm(){s.cm=null;s.cf=null;R();}

function onK(e){
  const ii=["INPUT","TEXTAREA","SELECT"].includes(document.activeElement?.tagName);
  if(e.key==="Escape"){if(s.cm)xcfm();else if(s.ed){s.ed=null;}else if(s.exp){s.exp=false;}else if(s.keys){s.keys=false;}else if(s.sel.size)s.sel.clear();e.preventDefault();R();return;}
  if(e.key==="Enter"){if(s.cm){e.preventDefault();s.cf?.();xcfm();return;}if(s.keys||s.exp){e.preventDefault();s.keys=false;s.exp=false;R();return;}if(s.ed&&!ii){e.preventDefault();s.ed=null;R();return;}}
  if(!ii&&!s.ed&&!s.exp&&!s.keys){
    if(e.key==="n"){e.preventDefault();document.getElementById("qi")?.focus();return;}
    if(e.key==="e"){e.preventDefault();s.exp=true;R();}
    if(e.key==="?"){e.preventDefault();s.keys=!s.keys;R();}
    if(e.key==="1"){s.f="All";R();}if(e.key==="2"){s.f="In Progress";R();}if(e.key==="3"){s.f="To Do";R();}if(e.key==="4"){s.f="Done";R();}
  }
  if(s.ed&&!ii){
    if(e.key==="t"){e.preventDefault();document.getElementById("ti")?.focus();}
    if(e.key==="n"){e.preventDefault();document.getElementById("ni")?.focus();}
    if(e.key==="1")up(s.ed,{status:"To Do"});if(e.key==="2")up(s.ed,{status:"In Progress"});if(e.key==="3")up(s.ed,{status:"Done"});
  }
}

function h(t,p,...k){const e=document.createElement(t);if(p)Object.entries(p).forEach(([a,v])=>{if(a==="style"&&typeof v==="object")Object.assign(e.style,v);else if(a.startsWith("on"))e.addEventListener(a.slice(2).toLowerCase(),v);else if(a==="className")e.className=v;else e.setAttribute(a,v);});k.flat(9).forEach(c=>{if(c!=null)e.append(typeof c==="string"?document.createTextNode(c):c);});return e;}

function R(){
  const a=document.getElementById("app");a.innerHTML="";
  if(!s.ok){a.append(h("div",{className:"empty"},"Chargement…"));return;}
  const fl=s.f==="All"?s.p:s.p.filter(p=>p.status===s.f);
  const ct={All:s.p.length};Object.keys(ST).forEach(x=>{ct[x]=s.p.filter(p=>p.status===x).length;});
  const scM={synced:{c:"var(--green)",t:"✓"},saving:{c:"var(--amber)",t:"⟳"},error:{c:"var(--red)",t:"✕"},loading:{c:"var(--blue)",t:"…"}};
  const sc=scM[s.sy]||scM.synced;

  const w=h("div",{className:"wrap"});

  // Topbar
  const tb=h("div",{className:"topbar"});
  const tl=h("div",{style:{display:"flex",alignItems:"center"}});
  tl.append(h("h1",{},"Projets"),h("span",{className:"sync",style:{color:sc.c}},sc.t));
  const tr=h("div",{className:"topbar-actions"});
  tr.append(
    h("button",{className:"icon-btn",title:"Raccourcis (?)",onClick:()=>{s.keys=true;R();}},"⌨"),
    h("button",{className:"icon-btn",title:"Export MD",onClick:()=>{s.exp=true;R();}},"↗")
  );
  tb.append(tl,tr);w.append(tb);

  // Quick input
  const qi=h("div",{className:"quick"});
  const qin=h("input",{id:"qi",placeholder:"Ajouter un projet…",value:s.an,onInput:e=>{s.an=e.target.value;},onKeydown:e=>{if(e.key==="Enter")qadd();}});
  const qs=h("select",{onInput:e=>{s.as=e.target.value;}});
  Object.keys(ST).forEach(x=>{const o=h("option",{value:x},x);if(x===s.as)o.selected=true;qs.append(o);});
  qi.append(qin,qs,h("button",{onClick:qadd},"Ajouter"));
  w.append(qi);

  // Filters
  const fld=h("div",{className:"filters"});
  ["All","In Progress","To Do","Done"].forEach(f=>{
    fld.append(h("button",{className:"ftab"+(s.f===f?" on":""),onClick:()=>{s.f=f;R();}},
      (f==="All"?"Tous":f)+" "+ct[f]));
  });
  fld.append(h("span",{className:"spacer"}));
  fld.append(h("button",{className:"btn-t",onClick:()=>cfm("Réinitialiser ?",()=>{ps(DF);s.ed=null;s.sel.clear();})},"↺"));
  if(!s.sel.size)fld.append(h("button",{className:"btn-t",onClick:()=>{fl.forEach(p=>s.sel.add(p.id));R();}},"☰"));
  w.append(fld);

  // Selection bar
  if(s.sel.size){
    const sb=h("div",{className:"selbar"});
    sb.append(
      h("button",{className:"btn-t",style:{fontWeight:"600",color:"var(--text)",fontSize:"11px"},onClick:()=>{s.sel.size===fl.length?s.sel.clear():fl.forEach(p=>s.sel.add(p.id));R();}},s.sel.size===fl.length?"☑ Désélect.":"☐ Tout"),
      h("span",{style:{flex:"1",color:"var(--sec)"}},s.sel.size+" sélect."),
      h("button",{className:"btn btn-r",style:{fontSize:"11px",padding:"4px 12px"},onClick:()=>cfm("Supprimer "+s.sel.size+" projet(s) ?",()=>{ps(s.p.filter(p=>!s.sel.has(p.id)));s.sel.clear();})},"Supprimer"),
      h("button",{className:"btn-t",style:{fontSize:"11px"},onClick:()=>{s.sel.clear();R();}},"Annuler")
    );w.append(sb);
  }

  // Cards
  if(!fl.length){w.append(h("div",{className:"empty"},"Aucun projet."));a.append(w);return;}
  const cl=h("div",{className:"cards"});
  fl.forEach(p=>{
    const ts=p.tasks||[],dc=ts.filter(t=>t.done).length;
    const pf=s.fp.has(p.id),pc=p.status==="Done"||pf,isSel=s.sel.has(p.id);
    const row=h("div",{className:"row"+(pf?" fading":"")+(!pf&&p.status==="Done"?" done":"")});

    // Checkbox
    row.append(h("div",{className:"check",onClick:e=>{e.stopPropagation();togP(p.id);}},
      h("div",{className:"cb"+(pc?" on":"")},pc?"✓":"")));

    // Card content
    const c=h("div",{className:"crd"+(isSel?" sel":""),onClick:()=>{
      if(s.sel.size){s.sel.has(p.id)?s.sel.delete(p.id):s.sel.add(p.id);R();}
      else{s.ed=p.id;s.nk="";s.nt="";R();}}});
    c.oncontextmenu=e=>{e.preventDefault();s.sel.has(p.id)?s.sel.delete(p.id):s.sel.add(p.id);R();};

    const top=h("div",{className:"crd-top"});
    const name=h("span",{className:"crd-name"+(pc?" done":"")},p.name);
    const meta=h("div",{className:"meta"});
    if(ts.length){
      const pg=h("div",{className:"prog"});
      pg.append(h("div",{className:"prog-fill",style:{width:(dc/ts.length*100)+"%",background:dc===ts.length?"var(--green)":"var(--amber)"}}));
      meta.append(pg,h("span",{},dc+"/"+ts.length));
    }
    if((p.notes||[]).length)meta.append(h("span",{},"💬 "+p.notes.length));
    const st=ST[p.status];
    const pill=h("span",{className:"pill",style:{color:st.c,background:st.bg}},p.status);
    top.append(name,meta,pill);c.append(top);

    // Inline tasks
    if(ts.length){
      const itd=h("div",{className:"itasks"});
      ts.forEach((t,i)=>{
        const k=p.id+"-"+i,fg=s.ft.has(k),ck=t.done||fg;
        const it=h("div",{className:"it"+(fg?" fading":"")+(!fg&&t.done?" tdone":"")});
        it.append(
          h("div",{className:"it-cb"+(ck?" on":""),onClick:e=>{e.stopPropagation();togT(p.id,i);}},ck?"✓":""),
          h("span",{className:ck?"dn":""},t.text));
        itd.append(it);
      });c.append(itd);
    }
    row.append(c);cl.append(row);
  });
  w.append(cl);a.append(w);

  // Modals
  if(s.ed)rEdit();if(s.exp)rExp();if(s.keys)rKeys();if(s.cm)rCfm();
}

function rEdit(){
  const p=s.p.find(x=>x.id===s.ed);if(!p)return;
  const ts=p.tasks||[],dc=ts.filter(t=>t.done).length;
  const ov=h("div",{className:"ov",onClick:()=>{s.ed=null;R();}});
  const m=h("div",{className:"mod",onClick:e=>e.stopPropagation()});
  m.append(h("div",{className:"mod-hdr"},h("h3",{},p.name),h("button",{className:"mod-x",onClick:()=>{s.ed=null;R();}},"✕")));

  // Status
  const sr=h("div",{style:{display:"flex",gap:"4px",marginBottom:"16px"}});
  Object.entries(ST).forEach(([x,cfg])=>{sr.append(h("button",{
    className:"sb"+(p.status===x?" on":""),
    style:p.status===x?{borderColor:cfg.c,background:cfg.c,color:"#fff"}:{},
    onClick:()=>up(p.id,{status:x})},x));});
  m.append(sr);

  // Name
  m.append(h("div",{style:{marginBottom:"14px"}},h("label",{},"Nom"),h("input",{value:p.name,onInput:e=>up(p.id,{name:e.target.value})})));

  // Tasks
  const th=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}});
  th.append(h("label",{style:{margin:"0"}},"Tâches"+(ts.length?" ("+dc+"/"+ts.length+")":"")));
  const tbs=h("div",{style:{display:"flex",gap:"6px"}});
  if(dc)tbs.append(h("button",{className:"btn-t",onClick:()=>up(p.id,{tasks:ts.filter(t=>!t.done)})},"✓ Terminées"));
  if(ts.length>1)tbs.append(h("button",{className:"btn-t",onClick:()=>cfm("Vider les tâches ?",()=>up(p.id,{tasks:[]}))},"🗑"));
  th.append(tbs);
  const tir=h("div",{style:{display:"flex",gap:"6px",marginBottom:"8px"}});
  tir.append(h("input",{id:"ti",value:s.nk,placeholder:"Nouvelle tâche…",onInput:e=>{s.nk=e.target.value;},onKeydown:e=>{if(e.key==="Enter")atk();}}),h("button",{className:"btn btn-a",style:{padding:"8px 14px"},onClick:atk},"+"));
  const tl=h("div",{style:{display:"flex",flexDirection:"column",gap:"1px",maxHeight:"200px",overflowY:"auto"}});
  ts.forEach((t,i)=>{
    const k=p.id+"-"+i,fg=s.ft.has(k),ck=t.done||fg;
    const tr=h("div",{className:"tr"+(fg?" fading":""),style:{background:!fg&&t.done?"var(--green, #00C875)0a":"transparent"}});
    tr.style.background=!fg&&t.done?"rgba(0,200,117,.04)":"transparent";
    tr.append(
      h("div",{className:"it-cb"+(ck?" on":""),onClick:()=>togT(p.id,i)},ck?"✓":""),
      h("span",{style:{flex:"1",color:ck?"var(--muted)":"var(--text)",textDecoration:ck?"line-through":"none"}},t.text),
      h("span",{style:{fontSize:"9px",color:"var(--muted)",fontFamily:"'JetBrains Mono',monospace",whiteSpace:"nowrap"}},t.date),
      h("button",{className:"rm",onClick:()=>{const x=[...ts];x.splice(i,1);up(p.id,{tasks:x});}},"×"));
    tl.append(tr);
  });
  if(!ts.length)tl.append(h("div",{style:{padding:"8px",color:"var(--muted)",fontSize:"12px",textAlign:"center"}},"Aucune tâche"));
  m.append(h("div",{style:{marginBottom:"14px"}},th,tir,tl));

  // Notes
  const nh=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}});
  nh.append(h("label",{style:{margin:"0"}},"Notes"));
  if((p.notes||[]).length>1)nh.append(h("button",{className:"btn-t",onClick:()=>cfm("Vider les notes ?",()=>up(p.id,{notes:[]}))},"🗑"));
  const nir=h("div",{style:{display:"flex",gap:"6px",marginBottom:"8px"}});
  nir.append(h("input",{id:"ni",value:s.nt,placeholder:"Nouvelle note…",onInput:e=>{s.nt=e.target.value;},onKeydown:e=>{if(e.key==="Enter")ant();}}),h("button",{className:"btn btn-a",style:{padding:"8px 14px"},onClick:ant},"+"));
  const nl=h("div",{style:{display:"flex",flexDirection:"column",gap:"2px",maxHeight:"160px",overflowY:"auto"}});
  (p.notes||[]).forEach((n,i)=>{nl.append(h("div",{className:"nr"},
    h("span",{style:{fontSize:"9px",color:"var(--muted)",fontFamily:"'JetBrains Mono',monospace",whiteSpace:"nowrap",paddingTop:"1px"}},n.date),
    h("span",{style:{flex:"1"}},n.text),
    h("button",{className:"rm",onClick:()=>{const x=[...(p.notes||[])];x.splice(i,1);up(p.id,{notes:x});}},"×")));});
  if(!(p.notes||[]).length)nl.append(h("div",{style:{padding:"8px",color:"var(--muted)",fontSize:"12px",textAlign:"center"}},"Aucune note"));
  m.append(h("div",{style:{marginBottom:"14px"}},nh,nir,nl));

  // Footer
  const ft=h("div",{style:{display:"flex",justifyContent:"space-between",paddingTop:"12px",borderTop:"1px solid var(--border)"}});
  ft.append(
    h("button",{className:"btn btn-g",style:{color:"var(--red)",borderColor:"rgba(226,68,92,.2)",fontSize:"11px"},onClick:()=>cfm("Supprimer ce projet ?",()=>{ps(s.p.filter(x=>x.id!==p.id));s.ed=null;})},"Supprimer"),
    h("button",{className:"btn btn-a",style:{fontSize:"11px"},onClick:()=>{s.ed=null;R();}},"Fermer"));
  m.append(ft);ov.append(m);document.getElementById("app").append(ov);
}

function rExp(){
  let md="# Projets — "+new Date().toLocaleDateString("fr-BE",{day:"numeric",month:"long",year:"numeric"})+"\n\n";
  const g={"In Progress":[],"To Do":[],"Done":[]};s.p.forEach(p=>{if(g[p.status])g[p.status].push(p);});
  for(const[x,items]of Object.entries(g)){if(!items.length)continue;md+="## "+x+" ("+items.length+")\n\n";items.forEach(p=>{md+="### "+p.name+"\n";if(p.tasks?.length){md+="- **Tâches** :\n";p.tasks.forEach(t=>{md+="  - ["+(t.done?"x":" ")+"] "+t.text+"\n";});}if(p.notes?.length){md+="- **Notes** :\n";p.notes.forEach(n=>{md+="  - `"+n.date+"` "+n.text+"\n";});}md+="\n";});}
  const ov=h("div",{className:"ov",onClick:()=>{s.exp=false;R();}});
  const m=h("div",{className:"mod",onClick:e=>e.stopPropagation()});
  m.append(h("div",{className:"mod-hdr"},h("h3",{},"Export Markdown"),h("button",{className:"mod-x",onClick:()=>{s.exp=false;R();}},"✕")));
  const w=h("div",{style:{position:"relative"}});
  w.append(h("pre",{style:{background:"var(--dark)",color:"#E6E9EF",padding:"16px",borderRadius:"10px",fontSize:"12px",lineHeight:"1.5",maxHeight:"400px",overflowY:"auto",whiteSpace:"pre-wrap",wordBreak:"break-word",fontFamily:"'JetBrains Mono',monospace"}},md));
  w.append(h("button",{className:"btn btn-g",style:{position:"absolute",top:"8px",right:"8px",fontSize:"10px",padding:"4px 10px"},onClick:()=>navigator.clipboard.writeText(md)},"Copier"));
  m.append(w);ov.append(m);document.getElementById("app").append(ov);
}

function rKeys(){
  const ov=h("div",{className:"ov",onClick:()=>{s.keys=false;R();}});
  const m=h("div",{className:"mod",style:{maxWidth:"380px"},onClick:e=>e.stopPropagation()});
  m.append(h("div",{className:"mod-hdr"},h("h3",{},"Raccourcis"),h("button",{className:"mod-x",onClick:()=>{s.keys=false;R();}},"✕")));
  const kb=t=>h("kbd",{style:{display:"inline-flex",alignItems:"center",justifyContent:"center",minWidth:"24px",padding:"2px 7px",borderRadius:"5px",background:"var(--bg)",border:"1px solid var(--border)",fontSize:"11px",fontWeight:"600",color:"var(--accent)",fontFamily:"'JetBrains Mono',monospace"}},t);
  const rw=(l,k)=>h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid var(--border)"}},h("span",{style:{color:"var(--sec)",fontSize:"12px"}},l),kb(k));
  const sc=t=>h("div",{style:{fontSize:"10px",fontWeight:"700",color:"var(--accent)",textTransform:"uppercase",letterSpacing:".06em",padding:"10px 0 2px"}},t);
  m.append(sc("Vue liste"),rw("Focus saisie","N"),rw("Export","E"),rw("Filtres","1–4"),rw("Fermer","Esc"),sc("Projet ouvert"),rw("Tâche","T"),rw("Note","N"),rw("Statut","1–3"));
  ov.append(m);document.getElementById("app").append(ov);
}

function rCfm(){
  const ov=h("div",{className:"ov",style:{zIndex:"2000"},onClick:xcfm});
  ov.append(h("div",{className:"cfm",onClick:e=>e.stopPropagation()},h("p",{},s.cm),h("div",{style:{display:"flex",gap:"10px",justifyContent:"center"}},
    h("button",{className:"btn btn-g",style:{padding:"8px 20px"},onClick:xcfm},"Annuler"),
    h("button",{className:"btn btn-r",style:{padding:"8px 20px"},onClick:()=>{s.cf?.();xcfm();}},"Confirmer"))));
  document.getElementById("app").append(ov);
}
</script>
