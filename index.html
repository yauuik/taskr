<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📋 Mes Projets</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #22212C; --bg-dark: #17161D; --bg-card: #282A36;
  --accent: #BD93F9; --border: #44475A; --border-light: #343746;
  --text: #F8F8F2; --text-sec: #8394CC; --text-muted: #6272A4;
  --green: #50FA7B; --amber: #FFB86C; --red: #FF5555;
  --cyan: #8BE9FD; --pink: #FF79C6; --yellow: #F1FA8C;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.mono { font-family: 'JetBrains Mono', monospace; }

/* Header */
.header { background: var(--bg-dark); padding: 16px 24px 14px; margin-bottom: 16px; }
.header-inner { max-width: 800px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
.header h1 { font-size: 16px; font-weight: 700; letter-spacing: -.02em; }
.header .sub { color: var(--text-muted); font-size: 11px; margin-top: 2px; }
.sync-badge { font-size: 9px; font-weight: 600; margin-left: 8px; }

/* Buttons */
.btn { padding: 6px 14px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-size: 12px; font-family: inherit; transition: opacity .15s; }
.btn:hover { opacity: .85; }
.btn-accent { background: var(--accent); color: #fff; }
.btn-pink { background: var(--pink); color: #fff; }
.btn-red { background: var(--red); color: #fff; }
.btn-ghost { background: transparent; color: var(--text-sec); border: 1px solid var(--border); }
.btn-sm { padding: 4px 10px; font-size: 11px; }
.btn-tiny { background: none; border: none; color: var(--text-muted); font-size: 10px; cursor: pointer; font-family: inherit; }
.btn-tiny:hover { color: var(--text-sec); }

/* Filters */
.filters { display: flex; gap: 4px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
.filter-btn { padding: 3px 10px; border-radius: 14px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-sec); font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all .15s; }
.filter-btn.active { border-color: var(--accent); background: var(--accent); color: #fff; }

/* Selection bar */
.sel-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; padding: 6px 12px; background: rgba(255,121,198,.08); border-radius: 8px; border: 1px solid rgba(255,121,198,.27); font-size: 11px; }

/* Cards */
.card-list { display: flex; flex-direction: column; gap: 4px; }
.card-row { display: flex; align-items: flex-start; transition: opacity 2.8s ease-out; }
.card-row.fading { opacity: .2; }
.card-row.done { opacity: .5; }
.card-check { width: 32px; padding-top: 9px; display: flex; align-items: flex-start; justify-content: center; cursor: pointer; flex-shrink: 0; }
.checkbox { width: 16px; height: 16px; border-radius: 4px; border: 2px solid var(--text-muted); background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 10px; color: #fff; font-weight: 700; transition: all .2s; cursor: pointer; }
.checkbox.checked { border-color: var(--green); background: var(--green); }
.checkbox-sm { width: 14px; height: 14px; border-radius: 3px; border: 2px solid var(--text-muted); background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 9px; color: #fff; font-weight: 700; transition: all .2s; cursor: pointer; flex-shrink: 0; }
.checkbox-sm.checked { border-color: var(--green); background: var(--green); }
.card { flex: 1; background: var(--bg-card); border-radius: 8px; padding: 8px 12px; border: 1px solid var(--border); cursor: pointer; transition: box-shadow .15s, background .15s; box-shadow: 0 1px 2px rgba(0,0,0,.03); }
.card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.07); }
.card.selected { background: rgba(255,121,198,.08); border-color: rgba(255,121,198,.27); }
.card-title { font-size: 13px; font-weight: 600; line-height: 1.2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.card-title.done { text-decoration: line-through; color: var(--text-muted); }
.pill { display: inline-flex; align-items: center; gap: 3px; padding: 2px 8px; border-radius: 12px; font-size: 10px; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
.progress-bar { width: 40px; height: 3px; border-radius: 2px; background: var(--border-light); overflow: hidden; }
.progress-fill { height: 100%; border-radius: 2px; transition: width .3s; }

/* Inline tasks */
.inline-task { display: flex; align-items: center; gap: 6px; padding: 3px 4px; border-radius: 4px; font-size: 11px; transition: opacity 2.8s ease-out, background .4s ease-out; }
.inline-task.fading { background: rgba(80,250,123,.09); opacity: .15; }
.inline-task.task-done { opacity: .4; }
.inline-task span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.inline-task span.done-text { color: var(--text-muted); text-decoration: line-through; }

/* Modal */
.overlay { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,.55); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; padding: 16px; }
.modal { background: var(--bg-card); border-radius: 14px; padding: 20px 22px 16px; width: 100%; max-width: 520px; max-height: 85vh; overflow-y: auto; box-shadow: 0 25px 60px rgba(0,0,0,.4); }
.modal h3 { font-size: 15px; font-weight: 700; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text-muted); line-height: 1; padding: 4px 8px; }
.modal label { font-size: 11px; font-weight: 600; color: var(--cyan); display: block; margin-bottom: 3px; }
.modal input, .modal select { width: 100%; padding: 7px 10px; border-radius: 8px; border: 1px solid var(--border); font-size: 12px; font-family: inherit; outline: none; color: var(--text); background: var(--bg-card); box-sizing: border-box; }
.modal input:focus { border-color: var(--accent); }

/* Status buttons */
.status-btn { padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all .15s; }

/* Task/note rows in modal */
.task-row { display: flex; gap: 6px; align-items: center; padding: 5px 8px; border-radius: 6px; font-size: 12px; transition: opacity 2.8s ease-out, background .4s ease-out; }
.task-row.fading { background: rgba(80,250,123,.15); opacity: 0; }
.note-row { display: flex; gap: 8px; align-items: flex-start; padding: 5px 8px; background: var(--bg); border-radius: 6px; font-size: 12px; line-height: 1.3; }
.remove-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 13px; padding: 0 2px; line-height: 1; }

/* Confirm */
.confirm-overlay { z-index: 2000; }
.confirm-box { background: var(--bg-card); border-radius: 16px; padding: 24px 28px; width: 100%; max-width: 360px; box-shadow: 0 25px 60px rgba(0,0,0,.4); text-align: center; }
.confirm-box p { margin: 0 0 20px; font-size: 15px; font-weight: 600; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div id="app"></div>

<script>
// ─── Config ───
const BIN_ID = "69b32b9ab7ec241ddc634928";
const API_KEY = "$2a$10$c6o3RYJkkxNpy7r.NY3DW.bz4LyKK5Pwz.3ALRn2LB7B9TB85jKiO";
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
const HEADERS = { "Content-Type": "application/json", "X-Master-Key": API_KEY };

const DEFAULT_PROJECTS = [
  { id:"p1", name:"Template Jira — Quiz Ciblage v2", status:"In Progress",
    tasks:[{text:"Ajouter les questions MC labels",done:false,date:"2026-01"},{text:"Ajouter les questions recurring journeys",done:false,date:"2026-01"},{text:"Valider les 5 nouvelles questions v2",done:true,date:"2025-12"}],
    notes:[{date:"2025-12",text:"5 questions validées (v2)"},{date:"2025-11",text:"Structure 2 parties"}] },
  { id:"p2", name:"E-Certificat Auto — Merge mensuel", status:"In Progress",
    tasks:[{text:"Prochaine vague (merge fichiers NRB ~25 du mois)",done:false,date:"2026-01"}],
    notes:[{date:"2025-12",text:"Script merge Python opérationnel"}] },
  { id:"p3", name:"Ambassadeur Data 2026", status:"To Do",
    tasks:[{text:"Planifier news #1",done:false,date:"2026-01"},{text:"Planifier premier atelier",done:false,date:"2026-01"},{text:"Formation data catalogue",done:false,date:"2026-01"},{text:"Formation ODE consumer",done:false,date:"2026-01"}],
    notes:[{date:"2026-01",text:"7 sous-objectifs"}] },
  { id:"p4", name:"Loyalty Auto Case 1", status:"In Progress", tasks:[], notes:[{date:"2026-01",text:"Automation 11 activities / 10 steps"}] },
  { id:"p5", name:"Exploitation Devis — Scripts hebdo", status:"Done",
    tasks:[{text:"Traitement 1",done:true,date:"2025-12"},{text:"Traitement 2",done:true,date:"2025-12"}],
    notes:[{date:"2025-12",text:"Opérationnels"}] },
  { id:"p6", name:"IBAN Récupération clients", status:"To Do",
    tasks:[{text:"Coordonner avec V. Pécasse et L. Kluge",done:false,date:"2026-01"}],
    notes:[{date:"2026-01",text:"~20% clients sans IBAN"}] },
];

const STATUS = {
  "To Do": { color:"#8BE9FD", bg:"rgba(139,233,253,.12)", icon:"○" },
  "In Progress": { color:"#FFB86C", bg:"rgba(255,184,108,.15)", icon:"◐" },
  "Done": { color:"#50FA7B", bg:"rgba(80,250,123,.15)", icon:"●" },
};

// ─── State ───
let state = {
  projects: [], loaded: false, syncStatus: "loading",
  filter: "All", editId: null, showAdd: false, showExport: false, showShortcuts: false,
  confirmMsg: null, confirmFn: null,
  newTask: "", newNote: "", addName: "", addStatus: "To Do",
  selected: new Set(), fadingTasks: new Set(), fadingProjects: new Set(),
};
const fadingTasksRef = new Set();
const fadingProjectsRef = new Set();
let saveTimer = null;

function genId() { return "p" + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function today() { return new Date().toISOString().slice(0,10); }

// ─── jsonbin ───
async function loadBin() {
  const r = await fetch(`${BIN_URL}/latest`, { headers: HEADERS });
  if (!r.ok) throw new Error("load failed");
  const d = await r.json();
  return d.record?.projects || [];
}
async function saveBin(projects) {
  const r = await fetch(BIN_URL, { method:"PUT", headers: HEADERS, body: JSON.stringify({projects}) });
  if (!r.ok) throw new Error("save failed");
}

function persist(projects) {
  state.projects = projects;
  state.syncStatus = "saving";
  render();
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try { await saveBin(projects); state.syncStatus = "synced"; } catch { state.syncStatus = "error"; }
    render();
  }, 800);
}

// ─── Init ───
(async () => {
  try {
    const d = await loadBin();
    state.projects = d.length > 0 ? d : DEFAULT_PROJECTS;
    if (d.length === 0) await saveBin(DEFAULT_PROJECTS);
    state.syncStatus = "synced";
  } catch {
    state.projects = DEFAULT_PROJECTS;
    state.syncStatus = "error";
  }
  state.loaded = true;
  render();
  document.addEventListener("keydown", handleKey);
})();

// ─── Actions ───
function updateProject(id, patch) {
  state.projects = state.projects.map(p => p.id === id ? {...p,...patch} : p);
  persist(state.projects);
}

function toggleProjectDone(id) {
  const p = state.projects.find(x => x.id === id);
  if (!p) return;
  if (state.fadingProjects.has(id)) {
    fadingProjectsRef.delete(id); state.fadingProjects.delete(id); render(); return;
  }
  if (p.status === "Done") { updateProject(id, {status:"To Do"}); return; }
  fadingProjectsRef.add(id); state.fadingProjects.add(id); render();
  setTimeout(() => {
    if (!fadingProjectsRef.has(id)) return;
    fadingProjectsRef.delete(id); state.fadingProjects.delete(id);
    updateProject(id, {status:"Done"});
  }, 3000);
}

function toggleTask(projId, idx) {
  const key = `${projId}-${idx}`;
  const p = state.projects.find(x => x.id === projId);
  const t = (p?.tasks||[])[idx];
  if (!t) return;
  if (state.fadingTasks.has(key)) {
    fadingTasksRef.delete(key); state.fadingTasks.delete(key); render(); return;
  }
  if (t.done) {
    const tasks = [...p.tasks]; tasks[idx] = {...tasks[idx], done:false};
    updateProject(projId, {tasks}); return;
  }
  fadingTasksRef.add(key); state.fadingTasks.add(key); render();
  setTimeout(() => {
    if (!fadingTasksRef.has(key)) return;
    fadingTasksRef.delete(key); state.fadingTasks.delete(key);
    const p2 = state.projects.find(x => x.id === projId);
    const tasks = [...(p2?.tasks||[])];
    if (tasks[idx] && !tasks[idx].done) tasks[idx] = {...tasks[idx], done:true};
    updateProject(projId, {tasks});
  }, 3000);
}

function addProject() {
  if (!state.addName.trim()) return;
  const np = {id:genId(), name:state.addName.trim(), status:state.addStatus, tasks:[], notes:[]};
  persist([np, ...state.projects]);
  state.addName = ""; state.addStatus = "To Do"; state.showAdd = false;
  state.editId = np.id; state.newTask = ""; state.newNote = "";
  render();
}

function addTask() {
  if (!state.newTask.trim() || !state.editId) return;
  const p = state.projects.find(x => x.id === state.editId);
  updateProject(state.editId, {tasks:[...(p.tasks||[]),{text:state.newTask.trim(),done:false,date:today()}]});
  state.newTask = ""; render();
}

function addNote() {
  if (!state.newNote.trim() || !state.editId) return;
  const p = state.projects.find(x => x.id === state.editId);
  updateProject(state.editId, {notes:[{date:today(),text:state.newNote.trim()},...(p.notes||[])]});
  state.newNote = ""; render();
}

function confirm(msg, fn) { state.confirmMsg = msg; state.confirmFn = fn; render(); }
function closeConfirm() { state.confirmMsg = null; state.confirmFn = null; render(); }

function handleKey(e) {
  const inInput = ["INPUT","TEXTAREA","SELECT"].includes(document.activeElement?.tagName);
  if (e.key === "Escape") {
    if (state.confirmMsg) { closeConfirm(); } else if (state.editId) { state.editId = null; } else if (state.showAdd) { state.showAdd = false; } else if (state.showExport) { state.showExport = false; } else if (state.showShortcuts) { state.showShortcuts = false; } else if (state.selected.size) { state.selected.clear(); }
    e.preventDefault(); render(); return;
  }
  if (e.key === "Enter") {
    if (state.confirmMsg) { e.preventDefault(); state.confirmFn?.(); closeConfirm(); return; }
    if (state.showAdd && inInput) { e.preventDefault(); addProject(); return; }
    if (state.editId && !inInput) { e.preventDefault(); state.editId = null; render(); return; }
    if (state.showShortcuts || state.showExport) { e.preventDefault(); state.showShortcuts = false; state.showExport = false; render(); return; }
  }
  if (!inInput && !state.editId && !state.showAdd && !state.showExport && !state.showShortcuts) {
    if (e.key === "n") { e.preventDefault(); state.showAdd = true; render(); }
    if (e.key === "e") { e.preventDefault(); state.showExport = true; render(); }
    if (e.key === "?") { e.preventDefault(); state.showShortcuts = !state.showShortcuts; render(); }
    if (e.key === "1") { state.filter = "All"; render(); }
    if (e.key === "2") { state.filter = "In Progress"; render(); }
    if (e.key === "3") { state.filter = "To Do"; render(); }
    if (e.key === "4") { state.filter = "Done"; render(); }
  }
  if (state.editId && !inInput) {
    if (e.key === "t") { e.preventDefault(); document.getElementById("task-input")?.focus(); }
    if (e.key === "n") { e.preventDefault(); document.getElementById("note-input")?.focus(); }
    if (e.key === "1") updateProject(state.editId, {status:"To Do"});
    if (e.key === "2") updateProject(state.editId, {status:"In Progress"});
    if (e.key === "3") updateProject(state.editId, {status:"Done"});
  }
}

// ─── Render ───
function h(tag, props, ...kids) {
  const el = document.createElement(tag);
  if (props) Object.entries(props).forEach(([k,v]) => {
    if (k === "style" && typeof v === "object") Object.assign(el.style, v);
    else if (k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === "className") el.className = v;
    else if (k === "html") el.innerHTML = v;
    else el.setAttribute(k, v);
  });
  kids.flat(9).forEach(c => { if (c != null) el.append(typeof c === "string" ? document.createTextNode(c) : c); });
  return el;
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  if (!state.loaded) { app.append(h("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",color:"#8394CC"}},"Chargement…")); return; }

  const filtered = state.filter === "All" ? state.projects : state.projects.filter(p => p.status === state.filter);
  const counts = { All: state.projects.length };
  Object.keys(STATUS).forEach(s => { counts[s] = state.projects.filter(p => p.status === s).length; });

  const syncMap = { synced:{c:"#50FA7B",t:"✓ synced"}, saving:{c:"#FFB86C",t:"⟳ saving…"}, error:{c:"#FF5555",t:"✕ offline"}, loading:{c:"#8BE9FD",t:"⟳ loading…"} };
  const sc = syncMap[state.syncStatus] || syncMap.synced;

  // Header
  const header = h("div",{className:"header"},
    h("div",{className:"header-inner"},
      h("div",{},
        h("div",{style:{display:"flex",alignItems:"center",gap:"8px"}},
          h("h1",{},"📋 Mes Projets"),
          h("span",{className:"sync-badge",style:{color:sc.c}},sc.t)
        ),
        h("p",{className:"sub"},`${state.projects.length} projet${state.projects.length>1?"s":""} · sync jsonbin`)
      ),
      h("div",{style:{display:"flex",gap:"6px"}},
        h("button",{className:"btn btn-ghost btn-sm",onClick:()=>{state.showShortcuts=true;render();},title:"Raccourcis (?)"},"⌨"),
        h("button",{className:"btn btn-ghost btn-sm",onClick:()=>{state.showExport=true;render();}},"📄 Export"),
        h("button",{className:"btn btn-pink btn-sm",onClick:()=>{state.showAdd=true;render();}},"+ Nouveau")
      )
    )
  );
  app.append(header);

  const main = h("div",{style:{maxWidth:"800px",margin:"0 auto",padding:"0 16px"}});

  // Filters
  const filtersDiv = h("div",{className:"filters"});
  ["All","In Progress","To Do","Done"].forEach(f => {
    const btn = h("button",{className:`filter-btn${state.filter===f?" active":""}`,onClick:()=>{state.filter=f;render();}},
      `${f==="All"?"Tous":f} (${counts[f]||0})`);
    filtersDiv.append(btn);
  });
  filtersDiv.append(h("button",{className:"btn-tiny",style:{marginLeft:"auto"},onClick:()=>confirm("Réinitialiser aux données par défaut ?",()=>{persist(DEFAULT_PROJECTS);state.editId=null;state.selected.clear();})},"↺ Reset"));
  if (!state.selected.size) filtersDiv.append(h("button",{className:"btn-tiny",onClick:()=>{filtered.forEach(p=>state.selected.add(p.id));render();}},"☰ Sélect."));
  main.append(filtersDiv);

  // Selection bar
  if (state.selected.size) {
    const bar = h("div",{className:"sel-bar"},
      h("button",{className:"btn-tiny",style:{fontWeight:"600",color:"#F8F8F2",fontSize:"11px"},onClick:()=>{
        state.selected.size===filtered.length ? state.selected.clear() : filtered.forEach(p=>state.selected.add(p.id)); render();
      }}, state.selected.size===filtered.length ? "☑ Tout désélect." : "☐ Tout sélect."),
      h("span",{style:{flex:"1",color:"#8394CC"}},`${state.selected.size} sélect.`),
      h("button",{className:"btn btn-red btn-sm",onClick:()=>confirm(`Supprimer ${state.selected.size} projet(s) ?`,()=>{persist(state.projects.filter(p=>!state.selected.has(p.id)));state.selected.clear();})},"🗑 ("+state.selected.size+")"),
      h("button",{className:"btn-tiny",style:{fontSize:"11px"},onClick:()=>{state.selected.clear();render();}},"Annuler")
    );
    main.append(bar);
  }

  // Cards
  if (filtered.length === 0) { main.append(h("div",{style:{textAlign:"center",padding:"24px",color:"#6272A4",fontSize:"12px"}},"Aucun projet dans cette catégorie.")); }
  const list = h("div",{className:"card-list"});
  filtered.forEach(p => {
    const tasks = p.tasks||[];
    const doneCount = tasks.filter(t=>t.done).length;
    const projFading = state.fadingProjects.has(p.id);
    const projChecked = p.status==="Done"||projFading;
    const isSel = state.selected.has(p.id);

    const row = h("div",{className:`card-row${projFading?" fading":""}${!projFading&&p.status==="Done"?" done":""}`});

    // Project checkbox
    const chk = h("div",{className:"card-check",onClick:e=>{e.stopPropagation();toggleProjectDone(p.id);}},
      h("div",{className:`checkbox${projChecked?" checked":""}`},projChecked?"✓":"")
    );
    row.append(chk);

    // Card
    const card = h("div",{className:`card${isSel?" selected":""}`,onClick:()=>{
      if(state.selected.size){state.selected.has(p.id)?state.selected.delete(p.id):state.selected.add(p.id);render();}
      else{state.editId=p.id;state.newTask="";state.newNote="";render();}
    }});
    card.oncontextmenu = e => { e.preventDefault(); state.selected.has(p.id)?state.selected.delete(p.id):state.selected.add(p.id); render(); };

    const top = h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",gap:"8px"}});
    const left = h("div",{style:{flex:"1",minWidth:"0"}});

    const titleRow = h("div",{style:{display:"flex",alignItems:"center",gap:"8px"}});
    titleRow.append(h("span",{className:`card-title${projChecked?" done":""}`},p.name));
    if((p.notes||[]).length) titleRow.append(h("span",{style:{fontSize:"10px",color:"#6272A4",flexShrink:"0"}},"💬 "+p.notes.length));
    left.append(titleRow);

    if(tasks.length) {
      const prog = h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginTop:"3px"}});
      const bar = h("div",{className:"progress-bar"});
      bar.append(h("div",{className:"progress-fill",style:{width:`${(doneCount/tasks.length)*100}%`,background:doneCount===tasks.length?"#50FA7B":"#FFB86C"}}));
      prog.append(bar, h("span",{style:{fontSize:"10px",color:"#8394CC"}},`${doneCount}/${tasks.length}`));
      left.append(prog);
    }

    const st = STATUS[p.status];
    const pill = h("span",{className:"pill",style:{color:st.color,background:st.bg}},`${st.icon} ${p.status}`);
    top.append(left, pill);
    card.append(top);

    // Inline tasks
    if(tasks.length) {
      const tl = h("div",{style:{marginTop:"6px",display:"flex",flexDirection:"column",gap:"1px"}});
      tasks.forEach((t,i) => {
        const key = `${p.id}-${i}`;
        const fading = state.fadingTasks.has(key);
        const checked = t.done || fading;
        const it = h("div",{className:`inline-task${fading?" fading":""}${!fading&&t.done?" task-done":""}`});
        const cb = h("div",{className:`checkbox-sm${checked?" checked":""}`,onClick:e=>{e.stopPropagation();toggleTask(p.id,i);}},checked?"✓":"");
        const sp = h("span",{className:checked?"done-text":""},t.text);
        it.append(cb, sp);
        tl.append(it);
      });
      card.append(tl);
    }

    row.append(card);
    list.append(row);
  });
  main.append(list);
  app.append(main);

  // ─── Modals ───
  if(state.editId) renderEditModal();
  if(state.showAdd) renderAddModal();
  if(state.showExport) renderExportModal();
  if(state.showShortcuts) renderShortcutsModal();
  if(state.confirmMsg) renderConfirm();
}

function renderEditModal() {
  const p = state.projects.find(x=>x.id===state.editId);
  if(!p) return;
  const tasks = p.tasks||[];
  const doneCount = tasks.filter(t=>t.done).length;

  const ov = h("div",{className:"overlay",onClick:()=>{state.editId=null;render();}});
  const m = h("div",{className:"modal",onClick:e=>e.stopPropagation()});

  const hdr = h("div",{className:"modal-header"},h("h3",{},"Détails du projet"),h("button",{className:"modal-close",onClick:()=>{state.editId=null;render();}},"✕"));
  m.append(hdr);

  // Name
  const nameLabel = h("label",{},"Nom");
  const nameInput = h("input",{value:p.name,onInput:e=>updateProject(p.id,{name:e.target.value})});
  m.append(h("div",{style:{marginBottom:"12px"}},nameLabel,nameInput));

  // Status
  const stLabel = h("label",{},"Statut");
  const stRow = h("div",{style:{display:"flex",gap:"4px"}});
  Object.entries(STATUS).forEach(([s,cfg]) => {
    const active = p.status===s;
    const btn = h("button",{className:"status-btn",style:{
      border:active?`2px solid ${cfg.color}`:`1px solid #44475A`,
      background:active?cfg.bg:"#282A36", color:active?cfg.color:"#6272A4",
    },onClick:()=>updateProject(p.id,{status:s})},`${cfg.icon} ${s}`);
    stRow.append(btn);
  });
  m.append(h("div",{style:{marginBottom:"12px"}},stLabel,stRow));

  // Tasks
  const tHeader = h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"5px"}});
  tHeader.append(h("label",{},`✅ Tâches ${tasks.length?`(${doneCount}/${tasks.length})`:""}`));
  const tBtns = h("div",{style:{display:"flex",gap:"6px"}});
  if(doneCount) tBtns.append(h("button",{className:"btn-tiny",onClick:()=>{updateProject(p.id,{tasks:tasks.filter(t=>!t.done)});}},"✓ Terminées"));
  if(tasks.length>1) tBtns.append(h("button",{className:"btn-tiny",onClick:()=>confirm("Supprimer toutes les tâches ?",()=>updateProject(p.id,{tasks:[]}))},"🗑 Tout"));
  tHeader.append(tBtns);

  const tInputRow = h("div",{style:{display:"flex",gap:"6px",marginBottom:"6px"}});
  const tInput = h("input",{id:"task-input",value:state.newTask,placeholder:"Ajouter une tâche…",onInput:e=>{state.newTask=e.target.value;},onKeydown:e=>{if(e.key==="Enter")addTask();}});
  tInputRow.append(tInput, h("button",{className:"btn btn-accent",style:{padding:"8px 14px"},onClick:addTask},"+"));

  const tList = h("div",{style:{display:"flex",flexDirection:"column",gap:"2px",maxHeight:"180px",overflowY:"auto"}});
  tasks.forEach((t,i) => {
    const key = `${p.id}-${i}`;
    const fading = state.fadingTasks.has(key);
    const checked = t.done||fading;
    const tr = h("div",{className:`task-row${fading?" fading":""}`,style:{background:fading?undefined:t.done?"rgba(80,250,123,.13)":"#22212C"}});
    tr.append(
      h("div",{className:`checkbox-sm${checked?" checked":""}`,onClick:()=>toggleTask(p.id,i)},checked?"✓":""),
      h("span",{style:{flex:"1",color:checked?"#6272A4":"#F8F8F2",textDecoration:checked?"line-through":"none"}},t.text),
      h("span",{className:"mono",style:{fontSize:"9px",color:"#6272A4",whiteSpace:"nowrap"}},t.date),
      h("button",{className:"remove-btn",onClick:()=>{const ts=[...tasks];ts.splice(i,1);updateProject(p.id,{tasks:ts});}},"×")
    );
    tList.append(tr);
  });
  if(!tasks.length) tList.append(h("p",{style:{fontSize:"11px",color:"#6272A4",textAlign:"center",padding:"4px"}},"Aucune tâche"));
  m.append(h("div",{style:{marginBottom:"12px"}},tHeader,tInputRow,tList));

  // Notes
  const nHeader = h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"5px"}});
  nHeader.append(h("label",{},"💬 Notes"));
  if((p.notes||[]).length>1) nHeader.append(h("button",{className:"btn-tiny",onClick:()=>confirm("Supprimer toutes les notes ?",()=>updateProject(p.id,{notes:[]}))},"🗑 Tout"));

  const nInputRow = h("div",{style:{display:"flex",gap:"6px",marginBottom:"6px"}});
  const nInput = h("input",{id:"note-input",value:state.newNote,placeholder:"Ajouter une note…",onInput:e=>{state.newNote=e.target.value;},onKeydown:e=>{if(e.key==="Enter")addNote();}});
  nInputRow.append(nInput, h("button",{className:"btn btn-accent",style:{padding:"8px 14px"},onClick:addNote},"+"));

  const nList = h("div",{style:{display:"flex",flexDirection:"column",gap:"2px",maxHeight:"160px",overflowY:"auto"}});
  (p.notes||[]).forEach((n,i) => {
    const nr = h("div",{className:"note-row"},
      h("span",{className:"mono",style:{fontSize:"9px",color:"#6272A4",whiteSpace:"nowrap",paddingTop:"1px"}},n.date),
      h("span",{style:{flex:"1"}},n.text),
      h("button",{className:"remove-btn",onClick:()=>{const ns=[...(p.notes||[])];ns.splice(i,1);updateProject(p.id,{notes:ns});}},"×")
    );
    nList.append(nr);
  });
  if(!(p.notes||[]).length) nList.append(h("p",{style:{fontSize:"11px",color:"#6272A4",textAlign:"center",padding:"4px"}},"Aucune note"));
  m.append(h("div",{style:{marginBottom:"12px"}},nHeader,nInputRow,nList));

  // Footer
  const footer = h("div",{style:{display:"flex",justifyContent:"space-between",borderTop:"1px solid #343746",paddingTop:"10px",marginTop:"2px"}});
  footer.append(
    h("button",{className:"btn btn-ghost btn-sm",style:{color:"#FF5555",borderColor:"rgba(255,85,85,.27)"},onClick:()=>confirm(`Supprimer "${p.name}" ?`,()=>{persist(state.projects.filter(x=>x.id!==p.id));state.editId=null;})},"🗑 Supprimer"),
    h("button",{className:"btn btn-accent btn-sm",onClick:()=>{state.editId=null;render();}},"Fermer")
  );
  m.append(footer);
  ov.append(m);
  document.getElementById("app").append(ov);
}

function renderAddModal() {
  const ov = h("div",{className:"overlay",onClick:()=>{state.showAdd=false;render();}});
  const m = h("div",{className:"modal",style:{maxWidth:"420px"},onClick:e=>e.stopPropagation()});
  m.append(h("div",{className:"modal-header"},h("h3",{},"Nouveau projet"),h("button",{className:"modal-close",onClick:()=>{state.showAdd=false;render();}},"✕")));
  const nameInput = h("input",{value:state.addName,placeholder:"Ex: Campagne X-sell Assistance",autofocus:"true",onInput:e=>{state.addName=e.target.value;},onKeydown:e=>{if(e.key==="Enter")addProject();}});
  m.append(h("div",{style:{marginBottom:"10px"}},h("label",{},"Nom du projet *"),nameInput));
  const sel = h("select",{onInput:e=>{state.addStatus=e.target.value;}});
  Object.keys(STATUS).forEach(s=>{const o=h("option",{value:s},s);if(s===state.addStatus)o.selected=true;sel.append(o);});
  m.append(h("div",{style:{marginBottom:"10px"}},h("label",{},"Statut"),sel));
  const btns = h("div",{style:{display:"flex",gap:"8px",justifyContent:"flex-end",marginTop:"4px"}});
  btns.append(h("button",{className:"btn btn-ghost",onClick:()=>{state.showAdd=false;render();}},"Annuler"), h("button",{className:"btn btn-accent",onClick:addProject},"Créer"));
  m.append(btns);
  ov.append(m);
  document.getElementById("app").append(ov);
  setTimeout(()=>nameInput.focus(),50);
}

function renderExportModal() {
  let md = `# Projets — ${new Date().toLocaleDateString("fr-BE",{day:"numeric",month:"long",year:"numeric"})}\n\n`;
  const groups = {"In Progress":[],"To Do":[],"Done":[]};
  state.projects.forEach(p=>{if(groups[p.status])groups[p.status].push(p);});
  for(const[s,items]of Object.entries(groups)){if(!items.length)continue;const c=STATUS[s];md+=`## ${c.icon} ${s} (${items.length})\n\n`;items.forEach(p=>{md+=`### ${p.name}\n`;if(p.tasks?.length){md+=`- **Tâches** :\n`;p.tasks.forEach(t=>{md+=`  - [${t.done?"x":" "}] ${t.text}\n`;});}if(p.notes?.length){md+=`- **Notes** :\n`;p.notes.forEach(n=>{md+=`  - \`${n.date}\` ${n.text}\n`;});}md+="\n";});}
  const ov = h("div",{className:"overlay",onClick:()=>{state.showExport=false;render();}});
  const m = h("div",{className:"modal",onClick:e=>e.stopPropagation()});
  m.append(h("div",{className:"modal-header"},h("h3",{},"Export Markdown"),h("button",{className:"modal-close",onClick:()=>{state.showExport=false;render();}},"✕")));
  const wrap = h("div",{style:{position:"relative"}});
  wrap.append(h("pre",{className:"mono",style:{background:"#17161D",color:"#F8F8F2",padding:"16px",borderRadius:"12px",fontSize:"12px",lineHeight:"1.5",maxHeight:"400px",overflowY:"auto",whiteSpace:"pre-wrap",wordBreak:"break-word"}},md));
  wrap.append(h("button",{className:"btn btn-ghost btn-sm",style:{position:"absolute",top:"8px",right:"8px"},onClick:()=>navigator.clipboard.writeText(md)},"📋 Copier"));
  m.append(wrap);
  ov.append(m);
  document.getElementById("app").append(ov);
}

function renderShortcutsModal() {
  const ov = h("div",{className:"overlay",onClick:()=>{state.showShortcuts=false;render();}});
  const m = h("div",{className:"modal",style:{maxWidth:"420px"},onClick:e=>e.stopPropagation()});
  m.append(h("div",{className:"modal-header"},h("h3",{},"Raccourcis clavier"),h("button",{className:"modal-close",onClick:()=>{state.showShortcuts=false;render();}},"✕")));
  const kbd = t => h("kbd",{className:"mono",style:{display:"inline-flex",alignItems:"center",justifyContent:"center",minWidth:"28px",padding:"2px 8px",borderRadius:"6px",background:"#17161D",border:"1px solid #44475A",fontSize:"12px",fontWeight:"600",color:"#50FA7B"}},t);
  const row = (label,key) => h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #343746"}}, h("span",{style:{color:"#8394CC",fontSize:"13px"}},label), kbd(key));
  const sec = t => h("div",{style:{fontSize:"11px",fontWeight:"700",color:"#FF79C6",textTransform:"uppercase",letterSpacing:".05em",padding:"14px 0 4px"}},t);
  const content = h("div",{},
    sec("Général"), row("Nouveau projet","N"), row("Export Markdown","E"), row("Raccourcis clavier","?"), row("Fermer / annuler","Esc"),
    sec("Filtres (vue liste)"), row("Tous","1"), row("In Progress","2"), row("To Do","3"), row("Done","4"),
    sec("Dans un projet ouvert"), row("Ajouter tâche","T"), row("Ajouter note","N"), row("Statut → To Do","1"), row("Statut → In Progress","2"),
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0"}}, h("span",{style:{color:"#8394CC",fontSize:"13px"}},"Statut → Done"), kbd("3"))
  );
  m.append(content);
  ov.append(m);
  document.getElementById("app").append(ov);
}

function renderConfirm() {
  const ov = h("div",{className:"overlay confirm-overlay",onClick:closeConfirm});
  const box = h("div",{className:"confirm-box",onClick:e=>e.stopPropagation()},
    h("p",{},state.confirmMsg),
    h("div",{style:{display:"flex",gap:"10px",justifyContent:"center"}},
      h("button",{className:"btn btn-ghost",style:{padding:"8px 20px",fontSize:"13px"},onClick:closeConfirm},"Annuler"),
      h("button",{className:"btn btn-red",style:{padding:"8px 20px",fontSize:"13px"},onClick:()=>{state.confirmFn?.();closeConfirm();}},"Confirmer")
    )
  );
  ov.append(box);
  document.getElementById("app").append(ov);
}
</script>
</body>
</html>
